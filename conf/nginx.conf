#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  # Racine web = dossier www/ (pas la racine du dépôt)
  alias __INSTALL_DIR__/www/;

  index index.php;

  # Import CSV, ZIP d’affiches et sauvegarde SQLite (jusqu’à 128 Mo côté app)
  client_max_body_size 400M;

  try_files $uri $uri/ @__APP__;

  location ~ [^/]\.php(/|$) {
    if (!-f $request_filename) { return 404; }

    fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $request_filename;
    fastcgi_param PATH_INFO $fastcgi_path_info;
  }

  # Données applicatives hors www/ (lib/, sql/, data/ embarqué dans le dépôt)
  location ~ ^__PATH__/(lib|sql|data|templates|tests|samples)/ {
    deny all;
  }
}

location @__APP__ {
  rewrite ^__PATH__/(.*)$ __PATH__/index.php?$query_string last;
}
